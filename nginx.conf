worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;

  brotli on;
  brotli_types text/html text/css application/javascript
               application/json application/wasm model/gltf-binary;
  brotli_comp_level 6;

  gzip on;
  gzip_types text/html text/css application/javascript application/json;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Cross-Origin-Opener-Policy same-origin always;
  add_header Cross-Origin-Embedder-Policy require-corp always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://fonts.googleapis.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header Permissions-Policy "autoplay=(self), camera=(), fullscreen=(self), geolocation=(), microphone=(), payment=(), usb=()" always;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /_astro/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /basis/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      types {
        application/wasm wasm;
      }
    }

    location /models/ {
      expires 30d;
      add_header Cache-Control "public";
    }

    location /textures/ {
      expires 30d;
      add_header Cache-Control "public";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /audio/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /fonts/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
